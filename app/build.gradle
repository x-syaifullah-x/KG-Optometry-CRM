plugins {
    id "com.android.application"
    id "androidx.navigation.safeargs"
    id "com.google.firebase.crashlytics"
    id "com.google.gms.google-services"
    id "kotlin-android"
    id "kotlin-kapt"
    id "kotlin-parcelize"
}

android {
    compileSdkVersion build_versions.compile_sdk
    buildToolsVersion build_versions.build_tools

    defaultConfig {
        applicationId "com.lizpostudio.kgoptometrycrm"
        minSdkVersion build_versions.min_sdk
        targetSdkVersion build_versions.target_sdk
        versionCode build_versions.version_code
        versionName build_versions.version_name

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    signingConfigs {
        debug {
            def store_file_release = file("$rootDir/key_store/debug/debug.jks")
            storeFile store_file_release
            storePassword "android"
            keyAlias "androiddebugkey"
            keyPassword "android"
        }

        release {
            def store_file_release = file("$rootDir/key_store/debug/debug.jks")
            storeFile store_file_release
            storePassword "android"
            keyAlias "androiddebugkey"
            keyPassword "android"
        }
    }

    buildTypes {
        release {
            minifyEnabled true
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
            signingConfig signingConfigs.release
        }
    }

    buildFeatures {
        dataBinding true
        viewBinding true
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = "1.8"
    }

    packagingOptions {
        exclude "META-INF/**"
        exclude "id/**"
        exclude "androidx/**"
        exclude "okhttp3/**"
        exclude "kotlin/**"
        exclude "org/**"
        exclude "**.properties"
        exclude "**.bin"
        exclude "kotlin-tooling-metadata.json"
    }
}

dependencies {
    implementation fileTree(dir: "libs", include: ["*.jar", "*.aar"])

    implementation "id.xxx.module:viewbinding:0.0.100"
    implementation "id.xxx.module:handle-crash:0.0.100"

    implementation platform("com.google.firebase:firebase-bom:$vFirebaseBom")
    implementation "com.google.firebase:firebase-crashlytics-ktx"
    implementation "com.google.firebase:firebase-analytics-ktx"
    implementation "com.google.firebase:firebase-database"
    implementation "com.google.firebase:firebase-database-ktx"
    implementation "com.google.firebase:firebase-storage-ktx"
    implementation "com.google.firebase:firebase-auth-ktx"
    implementation "com.firebaseui:firebase-ui-database:$vFirebaseUi"
    implementation "com.firebaseui:firebase-ui-auth:$vFirebaseUi"

    implementation "com.google.android.gms:play-services-auth:$vPlayServicesAuth"
    implementation "com.google.android.material:material:$vMaterial"

    implementation "com.google.code.gson:gson:$vGson"

    implementation "androidx.lifecycle:lifecycle-viewmodel-ktx:$vLifecycle"
    implementation "androidx.lifecycle:lifecycle-livedata-ktx:$vLifecycle"
    implementation "androidx.lifecycle:lifecycle-common-java8:$vLifecycle"
    implementation "androidx.appcompat:appcompat:$vAppCompat"
    implementation "androidx.room:room-ktx:$vRoom"
    implementation "androidx.preference:preference-ktx:1.2.0"
    implementation "androidx.constraintlayout:constraintlayout:$vConstraintLayout"
    implementation "androidx.fragment:fragment-ktx:$vFragmentKtx"
    implementation "androidx.navigation:navigation-fragment-ktx:$vNavigation"
    implementation "androidx.navigation:navigation-ui-ktx:$vNavigation"

    implementation "org.jetbrains.kotlinx:kotlinx-coroutines-core:$vCoroutines"
    implementation "org.jetbrains.kotlinx:kotlinx-coroutines-android:$vCoroutines"
    implementation "org.jetbrains.kotlinx:kotlinx-coroutines-play-services:1.6.0"

    testImplementation "junit:junit:$vJunit"

    androidTestImplementation "androidx.room:room-testing:$vRoom"
    androidTestImplementation "androidx.test.ext:junit-ktx:$vAndroidJunit"
    androidTestImplementation "androidx.test.espresso:espresso-core:$vEspresso"
    androidTestImplementation "com.android.support.test:rules:$vTestRules"

    kapt "androidx.room:room-compiler:$vRoom"
}